{% extends 'schedule_base.html' %}

{% block schedule_tab_content %}
  <div class="card border-primary mb-3">
    <div class="card-body">
      <!-- Checkbox Inputs -->
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="polar_align" name="polar_align" checked>
          <label class="form-check-label" for="polar_align">Polar Align (3PPA)</label>
        </div>
        <div class="form-check ms-3">
          <input class="form-check-input" type="checkbox" id="pa_verify" name="pa_verify">
          <label class="form-check-label" for="pa_verify"
                 title="After 3PPA, verifies accuracy with a plate solve and repeats until polar axis error is under {{ pa_threshold_deg }}° (up to {{ pa_max_tries }} attempts). Configurable in config.toml.">Verify with plate solve (loops until within threshold)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="auto_focus" name="auto_focus" checked>
          <label class="form-check-label" for="auto_focus">AutoFocus</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="dark_frames" name="dark_frames" checked>
          <label class="form-check-label" for="dark_frames">Dark Frames</label>
        </div>
    </div>
  </div>
{% endblock %}
