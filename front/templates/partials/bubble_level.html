<style>
    #bubble_level {
        position: relative;
        width: 300px;
        height: 300px;
        border: 2px solid rgba(255, 255, 255, 0.26);
        border-radius: 14px;
        background: rgba(3, 8, 18, 0.68);
    }

    #bubble_ball {
        position: absolute;
        top: 140px;
        left: 140px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #78f8bd, #16a085 68%);
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 0 16px rgba(22, 160, 133, 0.55);
        z-index: 10;
    }

    #bubble_level::after,
    #bubble_level::before {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.32);
        border-radius: 2px;
        pointer-events: none;
    }

    #bubble_level::after {
        left: 149px;
        width: 2px;
        height: 100%;
    }

    #bubble_level::before {
        top: 149px;
        width: 100%;
        height: 2px;
    }

    .bubble-level-readout {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        opacity: 0.9;
    }

    .bubble-level-readout .value {
        font-variant-numeric: tabular-nums;
        font-weight: 600;
    }
</style>

<button type="button" class="btn btn-secondary float-end"
        data-bs-toggle="modal" data-bs-target="#bubbleLevelModal">
    Show Bubble Level
</button>

<div class="modal fade" id="bubbleLevelModal" tabindex="-1"
     aria-labelledby="bubbleLevelModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document"
         style="max-width: 400px; width: 400px;">
        <div class="modal-content bg-dark text-white" style="height: 430px; overflow: visible;">
            <div class="modal-header">
                <h5 class="modal-title" id="bubbleLevelModalLabel">Bubble Level</h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body d-flex flex-column align-items-center justify-content-start p-3">
                <div id="bubble_level">
                    <div id="bubble_ball"></div>
                </div>
                <div class="bubble-level-readout">
                    X: <span id="bubble_output_x" class="value">0.00</span>
                    &nbsp; | &nbsp;
                    Y: <span id="bubble_output_y" class="value">0.00</span>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Based on https://developer.mozilla.org/en-US/docs/Web/API/Device_orientation_events/Detecting_device_orientation -->
<script>
    const bubbleBall = document.getElementById("bubble_ball");
    const bubbleGarden = document.getElementById("bubble_level");
    const bubbleOutputX = document.getElementById("bubble_output_x");
    const bubbleOutputY = document.getElementById("bubble_output_y");
    const bubbleModal = document.getElementById("bubbleLevelModal");
    let bubbleInterval = null;

    function updateBubbleOrientation(x, y) {
        const maxX = bubbleGarden.clientWidth - bubbleBall.clientWidth;
        const maxY = bubbleGarden.clientHeight - bubbleBall.clientHeight;

        // Bring up the scale to make easier to visualize
        x = x * 100;
        y = y * 100;

        bubbleOutputX.textContent = x.toFixed(2);
        bubbleOutputY.textContent = y.toFixed(2);

        // To make computation easier we shift the range of
        // x and y to [0,180]
        x += 100;
        y += 100;

        // 10 is half the size of the ball. It centers the movement point.
        bubbleBall.style.top = `${(maxY * x) / 180 - 10}px`;
        bubbleBall.style.left = `${(maxX * y) / 180 - 10}px`;
    }

    async function getBalanceSensor() {
        try {
            const baseURL = `${window.location.protocol}//${window.location.hostname}${window.location.port ? ':' + window.location.port : ''}`;
            const getBalanceSensorURL = baseURL + "/getbalancesensor";
            const response = await fetch(getBalanceSensorURL);
            const data = await response.json();
            updateBubbleOrientation(data["x"], data["y"]);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    function startBubbleLevel() {
        if (bubbleInterval !== null) {
            return;
        }
        getBalanceSensor();
        bubbleInterval = setInterval(getBalanceSensor, 250);
    }

    function stopBubbleLevel() {
        if (bubbleInterval !== null) {
            clearInterval(bubbleInterval);
            bubbleInterval = null;
        }
    }

    if (bubbleModal) {
        // Keep this modal above the Bootstrap backdrop even inside custom containers.
        if (bubbleModal.parentElement !== document.body) {
            document.body.appendChild(bubbleModal);
        }

        bubbleModal.addEventListener("shown.bs.modal", startBubbleLevel);
        bubbleModal.addEventListener("hidden.bs.modal", stopBubbleLevel);
    }
</script>
