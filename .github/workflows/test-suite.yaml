name: Validate test suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

jobs:
  run-test-suite:
    if: github.event_name == 'push' || 
        (github.event_name == 'pull_request' && github.event.action != 'closed') || 
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run lint checks
        run: ruff check

      - name: Run format checks
        run: ruff format --check

      - name: Run backend tests
        run: pytest -m "not integration" --cov=device --cov=front --cov-report=term --cov-fail-under=30.0 -q

      - name: Run simulator integration tests
        run: pytest -m integration tests/integration -q

      - name: Install frontend test dependencies
        run: npm ci
        working-directory: front

      - name: Run frontend tests
        run: npm test
        working-directory: front
